<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel - ระบบจองคิวนวด</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-hero"><div><h1>ระบบหลังบ้านร้านนวดและสปา</h1><p>จัดการการจอง บริการ สาขา พนักงาน รูปภาพ ธีม ชำระเงิน แจ้งเตือน และรายงานได้ในที่เดียว</p></div></div>
    <div class="login-form">
      <h2>เข้าสู่ระบบแอดมิน</h2>
      <p class="muted">ค่าเริ่มต้นหลังรัน setupSystem: admin@example.com / admin123</p>
      <div class="field"><label>อีเมล</label><input id="loginEmail" value="admin@example.com"></div>
      <div class="field"><label>รหัสผ่าน</label><input id="loginPassword" type="password" value="admin123"></div>
      <button class="btn" onclick="login()">เข้าสู่ระบบ</button>
      <div id="loginMsg"></div>
    </div>
  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar" id="sidebar"><div class="brand">✦ Massage Booking<br><small>Admin Control Center</small></div><div class="nav" id="nav"></div></aside>
  <main class="main">
    <div class="topbar"><div><button class="btn alt mobile-menu" onclick="sidebar.classList.toggle('open')">☰</button> <span class="page-title" id="pageTitle">Dashboard</span></div><div><button class="btn alt" onclick="openCustomer()">ดูหน้าเว็บ</button> <button class="btn alt" onclick="logout()">ออกจากระบบ</button></div></div>
    <div id="content"></div>
  </main>
</div>
<div class="modal" id="modal"><div class="modal-box"><div style="display:flex;justify-content:space-between;align-items:center;gap:12px"><h3 id="modalTitle">แก้ไขข้อมูล</h3><button class="btn alt" onclick="closeModal()">ปิด</button></div><div id="modalBody"></div></div></div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/admin.js" defer></script>
</body>
</html>
